<!DOCTYPE html>
<html>
<head>
  <title>Kasir Ayam Geprek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

<div style="
max-width:500px;
margin:auto;
padding:15px;
">

<div style="text-align:center;">
  <img src="logoo ayam geprek.jpeg"
  style="width:100%; max-width:400px; height:auto;">
</div>

<h2 style="text-align:center;">✪ INPUT TRANSAKSI ✪</h2>

<div style="text-align:center; margin-top:30px;">

  <!-- MODE -->
  <select id="mode" style="padding:8px; margin-bottom:15px;">
    <option value="transaksi">Transaksi</option>
    <option value="pengeluaran">Pengeluaran</option>
  </select>

  <br>

  <!-- FORM TRANSAKSI -->
  <div id="formTransaksi">

    <input type="date"
    id="tanggal"
    style="
    width:100%;
    padding:12px;
    box-sizing:border-box;
    ">
    <br><br>

    <select id="menu"
    style="
    width:100%;
    padding:12px;
    box-sizing:border-box;
    ">
      <option value="">PILIH MENU</option>
      <option>Ayam Goreng</option>
      <option>Geprek</option>
      <option>Gurami</option>
      <option>Ayam Goreng</option>
      <option>Ayam Bakar</option>
      <option>Nasi Ayam Geprek</option>
      <option>Nasi Ayam Kremes Goreng</option>
      <option>Nasi Ayam Kremes Bakar</option>
      <option>Nasi 3T Penyet</option>
      <option>Gurami Bakar</option>
      <option>Nasi Putih</option>
      <option>Telur</option>
      <option>Tahu</option>
      <option>Tempe</option>
      <option>Terong</option>
      <option>Sambal</option>
      <option>Pempek</option>
      <option>Indomie</option>
      <option>Krupuk</option>
      <option>Teh Hangat</option>
      <option>Es Teh</option>
      <option>Jeruk Hangat</option>
      <option>Es Jeruk</option>
      <option>You C</option>
      <option>Kopi Hitam</option>
      <option>Mineral</option>
    </select>

    <br><br>

    <input type="number"
    id="qty"
    placeholder="Qty"
    style="
    width:100%;
    padding:12px;
    box-sizing:border-box;
    ">

    <br><br>

    <p id="preview" style="font-weight:bold; font-size:18px;"></p>

    <br>

    <button onclick="tambahItem()"
style="
  margin-top:-20px;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
">
  ➕ Tambah
</button>

    <br><br>

    <div id="keranjang"></div>

    <br>
<button type="button" onclick="downloadStruk(); return false;">
  
  🧾 Download Struk
</button>

    <br>

    <button onclick="kirim()"
    style="
    width:100%;
    padding:12px;
    font-size:16px;
    margin-top:10px;
    ">
    💾 Simpan Transaksi
    </button>

  </div>

  <!-- FORM PENGELUARAN -->
<div id="formPengeluaran" style="display:none;">

  <input type="date" id="tanggalPengeluaran" 
  style="width:100%;
  padding:12px;
  box-sizing:border-box;">
  <br><br>

  <input type="text" id="ket" placeholder="Keterangan (contoh: beli LPG)" 
  style="width:100%;
  padding:12px;
  box-sizing:border-box;">
  <br><br>

  <input type="number" id="nominal" placeholder="Nominal" 
  style="width:100%;
  padding:12px;
  box-sizing:border-box;">
  <br><br>

  <input type="text" id="barang" placeholder="Nama barang (opsional stok)" 
  style="width:100%;
  padding:12px;
  box-sizing:border-box;">
  <br><br>

  <input type="number" id="jumlah" placeholder="Jumlah barang" 
  style="width:100%;
  padding:12px;
  box-sizing:border-box;">
  <br><br>

  <button onclick="tambahPengeluaran()">
  ➕ Tambah Pengeluaran
  </button>

  <br><br>

  <div id="listPengeluaran"></div>

  <br>

  <button onclick="kirim()">💾 Simpan Pengeluaran</button>

</div>

</div>

<script>

// SWITCH MODE
document.getElementById("mode").addEventListener("change", function() {
  let mode = this.value;

  document.getElementById("formTransaksi").style.display =
    mode === "transaksi" ? "block" : "none";

  document.getElementById("formPengeluaran").style.display =
    mode === "pengeluaran" ? "block" : "none";
});

// KERANJANG
let keranjang = [];
let keranjangPengeluaran = [];

// HARGA
const hargaMenu = {
  "Ayam Goreng": 16000,
  "Geprek": 16000,
  "Gurami": 25000,
  "Ayam Goreng": 16000,
  "Ayam Bakar": 16000,
  "Nasi Ayam Geprek": 18000,
  "Nasi Ayam Kremes Goreng": 18000,
  "Nasi Ayam Kremes Bakar": 18000,
  "Nasi 3T Penyet": 14000,
  "Gurami Bakar": 30000,
  "Nasi Putih": 5000,
  "Telur": 5000,
  "Tahu": 3000,
  "Tempe": 3000,
  "Terong": 3000,
  "Sambal": 5000,
  "Pempek": 18000,
  "Indomie": 6000,
  "Krupuk": 2000,

  "Teh Hangat": 5000,
  "Es Teh": 5000,
  "Jeruk Hangat": 8000,
  "Es Jeruk": 8000,
  "You C": 9000,
  "Kopi Hitam": 8000,
  "Mineral": 5000,
};

// PREVIEW
document.getElementById("qty").addEventListener("input", preview);
document.getElementById("menu").addEventListener("change", preview);

function preview() {
  let menu = document.getElementById("menu").value;
  let qty = parseInt(document.getElementById("qty").value);

  if (!menu || !qty) {
    document.getElementById("preview").innerText = "";
    return;
  }

  let harga = hargaMenu[menu];

  if (!harga) {
    document.getElementById("preview").innerText = "Harga tidak ditemukan";
    return;
  }

  let total = harga * qty;

  document.getElementById("preview").innerText =
    "Total: Rp " + total.toLocaleString("id-ID");
}

// TAMBAH ITEM
function tambahItem() {
  let menu = document.getElementById("menu").value;
  let qty = document.getElementById("qty").value;

  if (!menu || !qty) return alert("Isi dulu!");

  let harga = hargaMenu[menu];
  let total = harga * qty;

  keranjang.push({ menu, qty, harga, total });

  tampilkanKeranjang();

  document.getElementById("qty").value = "";
  document.getElementById("preview").innerText = "";
}

// TAMPILKAN
function tampilkanKeranjang() {
  let html = "";
  let grandTotal = 0;

  keranjang.forEach((item, i) => {
    html += `${i+1}. ${item.menu} x${item.qty} = Rp ${item.total.toLocaleString("id-ID")} <br>`;
    grandTotal += item.total;
  });

  html += `
  <div style="
  background:#ffe082;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  font-size:24px;
  font-weight:bold;
  ">
  TOTAL
  <br>
  Rp ${grandTotal.toLocaleString("id-ID")}
  </div>
  `;
  
  document.getElementById("keranjang").innerHTML = html;
}

function tambahPengeluaran() {

  let tanggal = document.getElementById("tanggalPengeluaran").value;
  let keterangan = document.getElementById("ket").value;
  let nominal = document.getElementById("nominal").value;
  let barang = document.getElementById("barang").value;
  let jumlah = document.getElementById("jumlah").value;

  if (!keterangan || !nominal) {
    alert("Isi keterangan dan nominal!");
    return;
  }

  keranjangPengeluaran.push({
    tanggal,
    keterangan,
    nominal: parseInt(nominal),
    barang,
    jumlah
  });

  tampilkanPengeluaran();

  document.getElementById("ket").value = "";
  document.getElementById("nominal").value = "";
  document.getElementById("barang").value = "";
  document.getElementById("jumlah").value = "";
}

function tampilkanPengeluaran() {

  let html = "";
  let total = 0;

  keranjangPengeluaran.forEach((item, i) => {

    html += `
      ${i+1}. ${item.keterangan}
      - Rp ${item.nominal.toLocaleString("id-ID")}
      <br>
    `;

    total += item.nominal;
  });

  html += `
    <div style="
    background:#ffe082;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
    ">
    TOTAL PENGELUARAN
    <br>
    Rp ${total.toLocaleString("id-ID")}
    </div>
  `;

  document.getElementById("listPengeluaran").innerHTML = html;
}

async function downloadStruk() {

  if (keranjang.length === 0) {
    alert("Tidak ada transaksi!");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  let total = 0;

  // JUDUL
  doc.setFont("courier", "bold");
  doc.text("AYAM GEPREK CYAMIK", 105, y, { align: "center" });
  y += 8;

  let tanggal = new Date().toLocaleString("id-ID");
  doc.setFont("courier", "normal");
  doc.text(tanggal, 105, y, { align: "center" });
  y += 10;

  doc.text("-----------------------------", 10, y);
  y += 8;

  // ITEM
  keranjang.forEach(item => {
    doc.text(item.menu, 10, y);
    y += 6;

    let line = `${item.qty} x Rp ${item.harga.toLocaleString("id-ID")} = Rp ${item.total.toLocaleString("id-ID")}`;
    doc.text(line, 10, y);
    y += 8;

    total += item.total;
  });

  doc.text("-----------------------------", 10, y);
  y += 8;

  // TOTAL
  doc.setFont("courier", "bold");
  doc.text(`Total: Rp ${total.toLocaleString("id-ID")}`, 10, y);
  y += 10;

  doc.setFont("courier", "normal");
  doc.text("Terima kasih", 105, y, { align: "center" });

  // AUTO DOWNLOAD PDF
  doc.save("struk_ayam_geprek.pdf");
}

// KIRIM
async function kirim() {

  let mode = document.getElementById("mode").value;

  // ================= TRANSAKSI =================
  if (mode === "transaksi") {

    if (keranjang.length === 0) {
      alert("Keranjang kosong!");
      return;
    }

    let tanggal = document.getElementById("tanggal").value;

    for (let item of keranjang) {
      await fetch("https://script.google.com/macros/s/AKfycbx4QAL2ghuwxEUOxX0r1fTfjcTTeForAeGaWMf19JMfi6-CDgVUqDc1-MWpVpXmFyY1/exec", {
        method: "POST",
        body: JSON.stringify({
          mode: "transaksi",
          tanggal: tanggal,
          menu: item.menu,
          qty: item.qty,
          harga: item.harga,
          total: item.total
        })
      });
    }

    alert("Transaksi berhasil");
    keranjang = [];
    document.getElementById("keranjang").innerHTML = "";
  }

  // ================= PENGELUARAN =================
if (mode === "pengeluaran") {

  if (keranjangPengeluaran.length === 0) {
    alert("Keranjang pengeluaran kosong!");
    return;
  }

  for (let item of keranjangPengeluaran) {

    await fetch("https://script.google.com/macros/s/AKfycbx4QAL2ghuwxEUOxX0r1fTfjcTTeForAeGaWMf19JMfi6-CDgVUqDc1-MWpVpXmFyY1/exec", {
      method: "POST",
      body: JSON.stringify({
        mode: "pengeluaran",
        tanggal: item.tanggal,
        keterangan: item.keterangan,
        nominal: item.nominal,
        nama_barang: item.barang,
        jumlah: item.jumlah
      })
    });

  }

  alert("Semua pengeluaran berhasil disimpan");

  keranjangPengeluaran = [];
  document.getElementById("listPengeluaran").innerHTML = "";
}
}

</script>

</div>

</body>
</html>
